
<!DOCTYPE html>
<html lang="en-SL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Login | P&H Consult</title>
    <style>
        :root {
            --primary: #2d5a27;   /* Forest Green */
            --secondary: #1a3a5f; /* Strategy Blue */
            --gold: #f39c12;      /* Impact Gold */
            --white: #ffffff;
            --bg: #f0f4f3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background: var(--bg); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }

        /* MASTER LOGIN BOX */
        .auth-container {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo-img { height: 60px; margin-bottom: 20px; }
        
        h2 { color: var(--secondary); margin-bottom: 10px; font-size: 1.8rem; }
        p { color: #666; margin-bottom: 30px; font-size: 0.95rem; }

        /* FORM STYLING */
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--secondary); font-size: 0.85rem; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            border: 1.5px solid #eee; 
            border-radius: 8px; 
            background: #fafafa;
            transition: 0.3s;
            font-size: 1rem;
        }
        input:focus { border-color: var(--primary); outline: none; background: white; }

        .btn-auth { 
            width: 100%; 
            padding: 16px; 
            background: var(--secondary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-auth:hover { background: var(--primary); transform: translateY(-2px); }

        /* TOGGLE BETWEEN LOGIN & SIGNUP */
        .toggle-text { margin-top: 25px; font-size: 0.9rem; color: #777; }
        .toggle-text a { color: var(--primary); font-weight: 700; text-decoration: none; cursor: pointer; }

        .back-home { display: block; margin-top: 30px; text-decoration: none; color: #aaa; font-size: 0.8rem; }

        /* HIDDEN CLASS FOR SIGNUP */
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <a href="index.html"><img src="logo.png" alt="P&H Logo" class="logo-img"></a>
        
        <!-- LOGIN FORM -->
        <div id="login-form">
            <h2>Welcome Back</h2>
            <p>Access the P&H Consult Admin Portal</p>
            <form action="admin-dashboard.html"> <!-- Link to dashboard -->
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="email@phconsult.org" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth">Secure Login</button>
            </form>
            <div class="toggle-text">
                Don't have an account? <a onclick="toggleAuth()">Request Access</a>
            </div>
        </div>

        <!-- SIGNUP / REQUEST ACCESS FORM -->
        <div id="signup-form" class="hidden">
            <h2>Request Access</h2>
            <p>Apply for a consultant or admin account</p>
            <form>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Michael Marah" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="yourname@phconsult.org" required>
                </div>
                <div class="form-group">
                    <label>Choose Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth" style="background: var(--primary);">Submit Request</button>
            </form>
            <div class="toggle-text">
                Already have an account? <a onclick="toggleAuth()">Login instead</a>
            </div>
        </div>

        <a href="index.html" class="back-home">← Back to P&H Consult Home</a>
    </div>

    <script>
        // Simple JavaScript to switch between Login and Signup without leaving the page
        function toggleAuth() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('signup-form').classList.toggle('hidden');
        }
    </script>

</body>
</html>
